---
###########################
###########################
## Linter GitHub Actions ##
###########################
###########################
name: Lint Code Base
# Variant slim - see: https://github.com/super-linter/super-linter?tab=readme-ov-file#super-linter-variants

#
# Documentation:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
#

#############################
# Start the job on all push #
#############################
on:
  push:
    branches-ignore:
      # notest branches to ignore testing of partial online commits
      - "notest/**"
  pull_request:
    branches-ignore:
      # notest branches to ignore testing of partial online commits
      - "notest/**"
  workflow_call:
    inputs:
      filter-regex-exclude:
        description: "Exclude from linting"
        required: false
        type: string
        default: ""
      log-level:
        description: "How much output the script will generate to the console. One of ERROR, WARN, NOTICE, INFO, or DEBUG."
        required: false
        type: string
        default: "INFO"
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
      validate-biome:
        description: "Enable or disable Biome validation"
        required: false
        type: boolean
        default: false
      validate-css:
        description: "Enable or disable CSS validation"
        required: false
        type: boolean
        default: true
      validate-spell-codespell:
        description: "Enable or disable SPELL_CODESPELL validation. It treats words from other languages than English as typos. Creating ignore/allowlist is impractical. Use with caution."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

###############
# Set the Job #
###############
jobs:
  build:
    # Name the Job
    name: Lint Code Base
    # Set the agent to run on
    runs-on: "${{ inputs.runs-on || 'ubuntu-latest' }}"
    # Limit the running time
    timeout-minutes: 10

    ##################
    # Load all steps #
    ##################
    steps:
      ##########################
      # Checkout the code base #
      ##########################
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          # Fetch all history for all branches and tags. Otherwise github.event.pull_request.base.ref SHA isn't found.
          fetch-depth: 0
          # git credentials are needed later, `false` would be safer: token not left in git config
          persist-credentials: true

      # Fetch latest changes (even by previous job)
      - name: Fetch latest changes
        if: ${{ !startsWith(github.ref, 'refs/pull/') }}
        run: git pull --ff-only origin "${GITHUB_REF}"
        env:
          GITHUB_REF: ${{ github.ref }}
          #GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Temporarily rename composer.json files (to prevent invoking composer within super-linter)
        # only if any composer.json exists
        if: ${{ hashFiles('**/composer.json') != '' }}
        shell: bash
        run: |
          set -eo pipefail
          mapfile -t composer_files < <(find . -type f -name composer.json | sort)
          if [ ${#composer_files[@]} -eq 0 ]; then
            exit 0
          fi
          map_file="action-${{ github.run_id }}-composer-map.txt"
          : > "$map_file"
          idx=0
          for file in "${composer_files[@]}"; do
            dir=$(dirname "$file")
            new_name="$dir/action-${{ github.run_id }}-composer-${idx}.json"
            mv "$file" "$new_name"
            printf '%s\t%s\n' "$new_name" "$file" >> "$map_file"
            idx=$((idx + 1))
          done
          echo "RENAMED_FILES_MAP=$map_file" >> "$GITHUB_ENV"

      # Dump the GitHub variables
      - name: Dump GitHub Variables
        run: |
          echo "GitHub Event Name: ${{ github.event_name }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_EVENT_PULL_REQUEST_BASE_NAME: ${{ github.event.pull_request.base.name }}

      - name: Create the default zizmor.yaml linter config
        if: ${{ !hashFiles('.github/linters/zizmor.yaml') }}
        run: |
          mkdir -p .github/linters
          {
            echo "---"
            echo "rules:"
            echo "  # disables the check - i.e. allows referring to version instead of an exact hash"
            echo "  unpinned-uses:"
            echo "    config:"
            echo "      policies:"
            echo "        \"*\": any"
          } > .github/linters/zizmor.yaml

      - name: Prepare linter env (Biome, CSS, Exclude)
        # because it is not possible to combine VALIDATE_X true and false. So VALIDATE can only be false while FIX can only be true.
        run: |
          enable_vars() {
            for name in "$@"; do
              echo "$name=true" >> "$GITHUB_ENV"
            done
          }

          disable_vars() {
            for name in "$@"; do
              echo "$name=false" >> "$GITHUB_ENV"
            done
          }

          if [ "${INPUTS_VALIDATE_BIOME}" = "true" ]; then
            enable_vars FIX_BIOME_FORMAT FIX_BIOME_LINT
          else
            disable_vars VALIDATE_BIOME_FORMAT VALIDATE_BIOME_LINT
          fi

          if [ "${INPUTS_VALIDATE_CSS}" = "true" ]; then
            enable_vars FIX_CSS
          else
            disable_vars VALIDATE_CSS
          fi

          if [ -n "${INPUTS_FILTER_REGEX_EXCLUDE}" ]; then
            echo "FILTER_REGEX_EXCLUDE=${INPUTS_FILTER_REGEX_EXCLUDE}" >> "$GITHUB_ENV"
          fi

          # It treats words from other languages than English as typos. Creating ignore/allowlist is impractical. Use with caution.
          if [ "${INPUTS_VALIDATE_SPELL_CODESPELL}" = "true" ]; then
            enable_vars FIX_SPELL_CODESPELL
          else
            disable_vars VALIDATE_SPELL_CODESPELL
          fi
        env:
          INPUTS_VALIDATE_BIOME: ${{ inputs.validate-biome }}
          INPUTS_VALIDATE_CSS: ${{ inputs.validate-css }}
          INPUTS_FILTER_REGEX_EXCLUDE: ${{ inputs.filter-regex-exclude }}
          INPUTS_VALIDATE_SPELL_CODESPELL: ${{ inputs.validate-spell-codespell }}

      ################################
      # Run Linter against code base #
      ################################
      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v8.7.0
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          #FILTER_REGEX_EXCLUDE: '.*\/vendor\/.*' # not needed as composer does not run
          FIX_ANSIBLE: true
          FIX_CSS_PRETTIER: true
          FIX_ENV: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true
          FIX_HTML_PRETTIER: true
          FIX_JAVASCRIPT_PRETTIER: true
          FIX_JSON_PRETTIER: true
          FIX_JSON: true
          FIX_JSONC: true
          FIX_JSONC_PRETTIER: true
          FIX_MARKDOWN_PRETTIER: true
          FIX_MARKDOWN: true
          FIX_NATURAL_LANGUAGE: true
          FIX_POWERSHELL: true
          FIX_PYTHON_BLACK: true
          FIX_PYTHON_ISORT: true
          FIX_PYTHON_RUFF: true
          FIX_SHELL_SHFMT: true
          FIX_SQLFLUFF: true
          FIX_YAML_PRETTIER: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOG_LEVEL: ${{ inputs.log-level }}
          # TODO 211003 returns false positive: {"line":"                    <li><a href=\"https://www.linkedin.com/company/MYCMSPROJECTSPECIFIC\" title=\"{=\"MYCMSPROJECTSPECIFIC na LinkedIn\"|translate}\"><i class=\"fa fa-linkedin\" aria-hidden=\"true\"></i></a></li>","lineNumber":56,"offender":"linkedin.com/company/MYCMSPROJECTSPECIFIC","offenderEntropy":-1,"commit":"","repo":"","repoURL":"","leakURL":"","rule":"LinkedIn Secret Key","commitMessage":"","author":"","email":"","file":".","date":"0001-01-01T00:00:00Z","tags":"secret, LinkedIn"}
          VALIDATE_GITLEAKS: false
          # Prettier is applied anyway and I don't want to have `.eslintrc.yml` configured
          VALIDATE_JAVASCRIPT_ES: false
          # Copy/paste detection with the default threshold 0% is too strict. Todo consider parametric JSCPD_CONFIG_FILE
          VALIDATE_JSCPD: false
          # PHPStan run in matrix strategy in php-composer-dependencies-reusable.yml
          VALIDATE_PHP_PHPSTAN: false
          VALIDATE_PHP_PSALM: false

      - name: Restore composer.json files
        if: ${{ always() && env.RENAMED_FILES_MAP != '' }}
        run: |
          set -eo pipefail
          map_file="$RENAMED_FILES_MAP"
          if [ ! -f "$map_file" ]; then
            exit 0
          fi
          while IFS=$'	' read -r renamed original; do
            if [ -n "$renamed" ] && [ -f "$renamed" ]; then
              mv "$renamed" "$original"
            fi
          done < "$map_file"

      - name: Show what changed even if super-linter fixed it and therefore passed
        # run even if super-linter failed
        if: ${{ always() }}
        run: |
          if ! git diff --quiet; then
            git status --porcelain
            git -c color.ui=always diff
            echo "❌ Linter made changes. Please commit them."
            exit 1
          fi

      - name: Create patch if there are changes
        id: patch
        if: ${{ failure() }}
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            ## `--binary` includes also EOL and EOF newline changes
            git diff --binary --no-color HEAD > lint-fixes.patch
            echo "changed=true" >> "$GITHUB_OUTPUT"
            ls -l lint-fixes.patch
          fi

      - name: Upload patch artifact
        # if super-linter failed and lint-fixes.patch exists
        if: ${{ failure() && steps.patch.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: lint-fixes
          path: lint-fixes.patch
          if-no-files-found: error
          # Then you can apply it locally with:
          # git apply lint-fixes.patch

      - name: Inform about patch artifact
        if: ${{ failure() && steps.patch.outputs.changed == 'true' && hashFiles('lint-fixes.patch') != '' }}
        run: echo "::notice title=lint-fixes artifact ready::You can apply locally with `git apply lint-fixes.patch`"
